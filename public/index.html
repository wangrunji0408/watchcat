<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Watchcat · Agent 会话监控</title>
<style>
  :root {
    --bg: #0f1117; --panel: #171a23; --panel2: #1e2230; --border: #2a2f3f;
    --text: #d8dce8; --dim: #8a91a5; --accent: #7aa2f7;
    --green: #9ece6a; --yellow: #e0af68; --gray: #565f89;
    --claude: #d97757; --codex: #e8e8ec; --openclaw: #f28c57; --hermes: #bb9af7;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; }
  body { margin: 0; background: var(--bg); color: var(--text);
    font: 14px/1.5 -apple-system, "PingFang SC", "Helvetica Neue", sans-serif; }
  header { display: flex; align-items: center; gap: 10px; padding: 10px 16px;
    padding-top: calc(10px + env(safe-area-inset-top));
    border-bottom: 1px solid var(--border); position: sticky; top: 0; background: var(--bg); z-index: 5; }
  header h1 { font-size: 17px; margin: 0; white-space: nowrap; }
  header .sub { color: var(--dim); font-size: 12px; }
  header .spacer { flex: 1; }
  .layout { display: flex; height: calc(100vh - 55px - env(safe-area-inset-top)); }
  .sidebar { width: 460px; min-width: 320px; overflow-y: auto; -webkit-overflow-scrolling: touch;
    border-right: 1px solid var(--border); padding: 12px;
    padding-bottom: calc(12px + env(safe-area-inset-bottom)); }
  .main { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; padding: 16px 24px;
    padding-bottom: calc(16px + env(safe-area-inset-bottom)); }

  .project { margin-bottom: 14px; background: var(--panel); border: 1px solid var(--border); border-radius: 10px; overflow: hidden; }
  .project.hot { border-color: #3d5a3d; }
  .project-head { display: flex; align-items: center; gap: 8px; padding: 10px 12px; cursor: pointer; user-select: none; }
  .project-head:hover { background: var(--panel2); }
  .project-name { font-weight: 600; word-break: break-all; }
  .project-meta { margin-left: auto; color: var(--dim); font-size: 12px; white-space: nowrap; }
  .chevron { color: var(--dim); font-size: 11px; transition: transform .15s; }
  .project.collapsed .chevron { transform: rotate(-90deg); }
  .project.collapsed .session-list { display: none; }

  .session { display: flex; gap: 10px; padding: 10px 12px; border-top: 1px solid var(--border); cursor: pointer; align-items: flex-start; }
  .session:hover { background: var(--panel2); }
  .session.active { background: #23283a; }
  .dot { width: 8px; height: 8px; border-radius: 50%; margin-top: 6px; flex-shrink: 0; }
  .dot.running { background: var(--green); box-shadow: 0 0 6px var(--green); animation: pulse 1.5s infinite; }
  .dot.open { background: var(--yellow); }
  .dot.idle { background: var(--gray); }
  @keyframes pulse { 50% { opacity: .4; } }
  .session-body { min-width: 0; flex: 1; }
  .session-title { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .session-sub { color: var(--dim); font-size: 12px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .session-proj { color: var(--accent); }
  .ctx { color: var(--accent); }
  .model { color: var(--dim); }
  .subagent-tag { color: var(--openclaw); }
  .cost { color: var(--green); }
  .cost.unknown { color: var(--dim); }
  .logo { width: 18px; height: 18px; flex-shrink: 0; margin-top: 2px; opacity: .9; }

  .msg { margin-bottom: 12px; max-width: 900px; }
  .msg .meta { font-size: 11px; color: var(--dim); margin-bottom: 3px; }
  .msg .bubble { padding: 8px 12px; border-radius: 8px; word-break: break-word; }
  .msg.user .bubble { background: #26314a; border: 1px solid #35476b; }
  .msg.assistant .bubble { background: var(--panel); border: 1px solid var(--border); }
  .msg.subagent-event .meta { color: var(--openclaw); }
  .subagent-card { display: block; width: 100%; max-width: 900px; text-align: left; color: var(--text);
    font: inherit; background: rgba(242,140,87,.08); border: 1px solid rgba(242,140,87,.35);
    padding: 9px 12px; border-radius: 8px; }
  button.subagent-card { cursor: pointer; }
  button.subagent-card:hover { background: rgba(242,140,87,.14); border-color: var(--openclaw); }
  .subagent-card-title { font-weight: 600; }
  .subagent-card-sub { margin-top: 2px; color: var(--dim); font-size: 12px; }
  .msg.thinking .bubble, .msg.tool_use .bubble, .msg.tool_result .bubble {
    background: transparent; border: 1px dashed var(--border); color: var(--dim); font-size: 12.5px;
    font-family: ui-monospace, Menlo, monospace; }
  .markdown-body { line-height: 1.6; }
  .markdown-body > :first-child { margin-top: 0; }
  .markdown-body > :last-child { margin-bottom: 0; }
  .markdown-body p, .markdown-body blockquote, .markdown-body ul, .markdown-body ol,
  .markdown-body pre, .markdown-body table, .markdown-body hr { margin: .65em 0; }
  .markdown-body h1, .markdown-body h2, .markdown-body h3,
  .markdown-body h4, .markdown-body h5, .markdown-body h6 {
    margin: 1em 0 .45em; line-height: 1.3; color: #eef1f8; }
  .markdown-body h1 { font-size: 1.5em; }
  .markdown-body h2 { font-size: 1.3em; border-bottom: 1px solid var(--border); padding-bottom: .25em; }
  .markdown-body h3 { font-size: 1.15em; }
  .markdown-body h4, .markdown-body h5, .markdown-body h6 { font-size: 1em; }
  .markdown-body ul, .markdown-body ol { padding-left: 1.7em; }
  .markdown-body li + li { margin-top: .2em; }
  .markdown-body blockquote { margin-left: 0; padding: .1em 1em; color: var(--dim); border-left: 3px solid var(--gray); }
  .markdown-body code, .markdown-body pre { font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; }
  .markdown-body code { padding: .12em .35em; border-radius: 4px; background: rgba(255,255,255,.08); font-size: .9em; }
  .markdown-body pre { max-width: 100%; overflow-x: auto; padding: 10px 12px; border: 1px solid var(--border);
    border-radius: 7px; background: #10131a; white-space: pre; -webkit-overflow-scrolling: touch; }
  .markdown-body pre code { padding: 0; background: transparent; font-size: 12.5px; }
  .markdown-body a { color: var(--accent); text-decoration: none; }
  .markdown-body a:hover { text-decoration: underline; }
  .markdown-body table { display: block; max-width: 100%; overflow-x: auto; border-collapse: collapse; }
  .markdown-body th, .markdown-body td { padding: 5px 9px; border: 1px solid var(--border); text-align: left; }
  .markdown-body th { background: var(--panel2); }
  .markdown-body hr { height: 1px; border: 0; background: var(--border); }
  .markdown-body img { display: block; max-width: 100%; max-height: 480px; border-radius: 6px; }
  .markdown-body input[type="checkbox"] { margin: 0 .45em 0 0; vertical-align: middle; }
  .activity { margin: 8px 0 12px; max-width: 900px; color: var(--dim); }
  .activity, .tool-item, .thought-item { border: 1px dashed var(--border); border-radius: 8px; }
  .activity > summary, .tool-item > summary, .thought-item > summary {
    cursor: pointer; user-select: none; list-style: none; }
  .activity > summary::-webkit-details-marker,
  .tool-item > summary::-webkit-details-marker,
  .thought-item > summary::-webkit-details-marker { display: none; }
  .activity > summary { padding: 7px 12px; font-size: 12.5px; }
  .activity > summary::before, .tool-item > summary::before, .thought-item > summary::before {
    content: '›'; display: inline-block; width: 14px; transition: transform .15s; }
  .activity[open] > summary::before, .tool-item[open] > summary::before, .thought-item[open] > summary::before {
    transform: rotate(90deg); }
  .activity-list { padding: 0 8px 8px 22px; }
  .tool-item, .thought-item { margin-top: 6px; background: rgba(255,255,255,.015); }
  .tool-item > summary, .thought-item > summary { padding: 6px 10px; font: 12px ui-monospace, Menlo, monospace; }
  .tool-detail { border-top: 1px dashed var(--border); padding: 7px 10px; }
  .tool-detail-label { color: var(--accent); font-size: 11px; margin: 5px 0 2px; }
  .tool-detail-label:first-child { margin-top: 0; }
  .tool-detail-value { white-space: pre-wrap; word-break: break-word; font: 12px/1.5 ui-monospace, Menlo, monospace; }
  .tool-detail-value.markdown-body { white-space: normal; font-family: inherit; }
  .msg.divider { color: var(--accent); font-size: 12px; border-bottom: 1px solid var(--border); padding-bottom: 4px; }
  .msg.compaction { display: flex; align-items: center; gap: 9px; color: var(--dim); font-size: 12px; }
  .msg.compaction::before, .msg.compaction::after { content: ''; height: 1px; background: var(--border); flex: 1; }
  .compaction-label { white-space: nowrap; padding: 2px 8px; border: 1px solid var(--border); border-radius: 999px; }
  .empty { color: var(--dim); text-align: center; margin-top: 15vh; }
  .stats-btn { background: var(--panel2); color: var(--text); border: 1px solid var(--border);
    border-radius: 8px; padding: 4px 12px; font-size: 13px; cursor: pointer; white-space: nowrap; }
  .stats-btn:hover { border-color: var(--accent); }
  .stats-btn.active { border-color: var(--accent); color: var(--accent); }

  /* ---------- 统计页 ---------- */
  .stats-page { max-width: 1080px; margin: 0 auto; }
  .stats-filter { display: flex; gap: 8px; align-items: center; margin-bottom: 16px; flex-wrap: wrap; }
  .stats-filter .range-btn { background: transparent; color: var(--dim); border: 1px solid var(--border);
    border-radius: 999px; padding: 3px 12px; font-size: 12.5px; cursor: pointer; }
  .stats-filter .range-btn:hover { color: var(--text); }
  .stats-filter .range-btn.active { color: var(--text); border-color: var(--accent); background: rgba(122,162,247,.12); }
  .kpi-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 10px; margin-bottom: 16px; }
  .kpi { background: var(--panel); border: 1px solid var(--border); border-radius: 10px; padding: 12px 14px; }
  .kpi-label { color: var(--dim); font-size: 12px; }
  .kpi-value { font-size: 24px; font-weight: 600; margin-top: 2px; }
  .chart-card { background: var(--panel); border: 1px solid var(--border); border-radius: 10px;
    padding: 14px 16px 12px; margin-bottom: 16px; }
  .chart-title { font-weight: 600; margin-bottom: 2px; }
  .chart-sub { color: var(--dim); font-size: 12px; margin-bottom: 10px; }
  .chart-legend { display: flex; flex-wrap: wrap; gap: 4px 14px; font-size: 12px; color: var(--dim); margin-top: 8px; }
  .chart-legend .key { display: inline-flex; align-items: center; gap: 5px; }
  .chart-legend .swatch { width: 10px; height: 10px; border-radius: 2px; flex-shrink: 0; }
  .chart-svg { display: block; width: 100%; }
  .chart-svg text { font: 11px -apple-system, "PingFang SC", sans-serif; fill: var(--dim); }
  .chart-svg .tick-label { font-variant-numeric: tabular-nums; }
  .chart-svg .grid { stroke: #232838; stroke-width: 1; }
  .chart-svg .axis { stroke: var(--border); stroke-width: 1; }
  .bar-seg { shape-rendering: crispEdges; }
  .bar-hit { fill: transparent; cursor: pointer; }
  .bar-hit:hover { fill: rgba(255,255,255,.05); }
  .viz-tooltip { position: fixed; z-index: 50; pointer-events: none; background: #0c0e14; border: 1px solid var(--border);
    border-radius: 8px; padding: 8px 11px; font-size: 12px; max-width: 320px; box-shadow: 0 4px 16px rgba(0,0,0,.5); }
  .viz-tooltip .tt-title { color: var(--dim); margin-bottom: 4px; }
  .viz-tooltip .tt-row { display: flex; align-items: center; gap: 6px; line-height: 1.7; }
  .viz-tooltip .tt-key { width: 10px; height: 3px; border-radius: 2px; flex-shrink: 0; }
  .viz-tooltip .tt-val { font-weight: 600; margin-left: auto; padding-left: 14px; font-variant-numeric: tabular-nums; }
  .viz-tooltip .tt-name { color: var(--dim); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 200px; }
  /* 热力图 */
  .heatmap-scroll { overflow-x: auto; -webkit-overflow-scrolling: touch; }
  .heatmap-cell { rx: 2px; cursor: pointer; }
  .heatmap-cell:hover { stroke: var(--text); stroke-width: 1; }
  .heatmap-scale { display: flex; align-items: center; gap: 4px; font-size: 11px; color: var(--dim); margin-top: 6px; }
  .heatmap-scale .cell { width: 10px; height: 10px; border-radius: 2px; }
  /* 项目条形图 */
  .hbar-row { display: grid; grid-template-columns: minmax(120px, 260px) 1fr 70px; gap: 10px; align-items: center;
    padding: 4px 0; font-size: 12.5px; }
  /* 长路径保尾部:内容右对齐,左侧溢出用渐隐遮罩截断 */
  .hbar-name { color: var(--text); white-space: nowrap; overflow: hidden; display: flex; justify-content: flex-end;
    -webkit-mask-image: linear-gradient(90deg, transparent, #000 24px); mask-image: linear-gradient(90deg, transparent, #000 24px); }
  .hbar-track { height: 16px; position: relative; }
  .hbar-fill { position: absolute; inset: 0 auto 0 0; background: var(--accent); border-radius: 0 4px 4px 0; min-width: 2px; }
  .hbar-val { text-align: right; font-variant-numeric: tabular-nums; color: var(--dim); }
  .legend { display: flex; gap: 12px; font-size: 12px; color: var(--dim); align-items: center; }
  .legend .dot { margin-top: 0; }
  .detail-head { position: sticky; top: -16px; background: var(--bg); padding: 8px 0; margin: -8px 0 12px;
    border-bottom: 1px solid var(--border); font-size: 13px; color: var(--dim); word-break: break-all;
    display: flex; gap: 10px; align-items: flex-start; z-index: 2; }
  .detail-summary { min-width: 0; }
  .detail-metrics { margin-top: 2px; color: var(--dim); font-size: 11px; }
  .back-btn { display: none; flex-shrink: 0; background: var(--panel2); color: var(--text);
    border: 1px solid var(--border); border-radius: 8px; padding: 4px 12px; font-size: 14px; cursor: pointer; }
  .back-btn.child-back { display: block; }

  @media (max-width: 800px) {
    header { flex-wrap: wrap; gap: 6px 10px; padding: 8px 12px; padding-top: calc(8px + env(safe-area-inset-top)); }
    .legend .txt { display: none; }
    .layout { display: block; height: auto; }
    .sidebar { width: 100%; min-width: 0; border-right: none; }
    /* 详情页改为全屏覆盖层 */
    .main { display: none; }
    body.detail-open { overflow: hidden; }
    body.detail-open .main { display: block; position: fixed; inset: 0; z-index: 20; background: var(--bg);
      padding: 12px 14px; padding-top: calc(12px + env(safe-area-inset-top));
      padding-bottom: calc(12px + env(safe-area-inset-bottom)); }
    .detail-head { top: calc(-12px - env(safe-area-inset-top)); padding-top: calc(8px + env(safe-area-inset-top)); }
    .back-btn { display: block; }
    .session { padding: 12px; }
    /* 窄屏下项目名独占一行,条形与金额移到第二行;改回头部对齐+尾部省略 */
    .hbar-row { grid-template-columns: 1fr 70px; }
    .hbar-name { grid-column: 1 / -1; display: block; text-overflow: ellipsis;
      -webkit-mask-image: none; mask-image: none; }
  }
</style>
</head>
<body>
<header>
  <h1>🐈 Watchcat</h1>
  <span class="sub" id="stats"></span>
  <div class="spacer"></div>
  <button class="stats-btn" id="statsToggle">📊 统计</button>
  <div class="legend">
    <span class="dot running"></span><span class="txt">运行中</span>
    <span class="dot open"></span><span class="txt">存活</span>
    <span class="dot idle"></span><span class="txt">空闲</span>
  </div>
</header>
<div class="layout">
  <div class="sidebar" id="sidebar"><div class="empty">加载中…</div></div>
  <div class="main" id="main"><div class="empty">选择左侧会话查看日志</div></div>
</div>
<script src="/vendor/marked.min.js"></script>
<script>
const state = {
  activeFile: null,
  activeSession: null,
  detailStack: [],
  collapsed: new Set(),
  knownProjects: new Set(),
  expandedDetails: new Set(),
  data: null,
  statsOpen: false,
  statsRange: 30, // 天数;0 = 全部
  statsData: null,
  statsAt: 0,
};

// ---------- 各来源 logo (内嵌 SVG 近似图形) ----------
const LOGOS = {
  // Claude: 橙色放射星标
  claude: (() => {
    let rays = '';
    for (let i = 0; i < 12; i++) {
      rays += '<path d="M12 3.2 L13 10.6 L12 12 L11 10.6 Z" transform="rotate(' + i * 30 + ' 12 12)"/>';
    }
    return '<svg class="logo" viewBox="0 0 24 24" fill="#d97757">' + rays + '</svg>';
  })(),
  // Codex (OpenAI): 六瓣旋花
  codex: (() => {
    let petals = '';
    for (let i = 0; i < 6; i++) {
      petals += '<rect x="10.9" y="2.2" width="2.6" height="11.2" rx="1.3" transform="rotate(' + (i * 60 + 14) + ' 12 12)"/>';
    }
    return '<svg class="logo" viewBox="0 0 24 24" fill="#e8e8ec">' + petals + '</svg>';
  })(),
  // OpenClaw: 橙色蟹钳
  openclaw: '<svg class="logo" viewBox="0 0 24 24" fill="none" stroke="#f28c57" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">' +
    '<path d="M8.5 9.5C5 8.8 3.3 6.5 4.2 4.2c2.6.2 4.5 1.7 5.3 4.3M15.5 9.5c3.5-.7 5.2-3 4.3-5.3-2.6.2-4.5 1.7-5.3 4.3"/>' +
    '<path d="M7 10.5c0 5 1.7 8 5 9.5 3.3-1.5 5-4.5 5-9.5M9.5 13h5M12 13v7"/></svg>',
  // Hermes: 紫色羽翼
  hermes: '<svg class="logo" viewBox="0 0 24 24" fill="none" stroke="#bb9af7" stroke-width="1.8" stroke-linecap="round">' +
    '<path d="M20.5 5.5 C14 5.5 9.5 9.5 7.5 16.5"/>' +
    '<path d="M20 9 C15.5 9 11.5 12 10 16.5"/>' +
    '<path d="M19.5 12.5 C16.5 12.5 13.5 14.5 12.5 16.5"/>' +
    '<path d="M4 16.5 H14"/></svg>',
};
const SRC_NAMES = { claude: 'Claude Code', codex: 'Codex', openclaw: 'OpenClaw', hermes: 'Hermes' };

function fmtTime(ts) {
  if (!ts) return '';
  const d = new Date(ts), now = new Date();
  const sameDay = d.toDateString() === now.toDateString();
  const hm = d.toTimeString().slice(0, 5);
  if (sameDay) return hm;
  return (d.getMonth() + 1) + '/' + d.getDate() + ' ' + hm;
}
function fmtAge(ts) {
  if (!ts) return '';
  const s = (Date.now() - Date.parse(ts)) / 1000;
  if (s < 60) return Math.floor(s) + ' 秒前';
  if (s < 3600) return Math.floor(s / 60) + ' 分钟前';
  if (s < 86400) return Math.floor(s / 3600) + ' 小时前';
  return Math.floor(s / 86400) + ' 天前';
}
function fmtK(n) {
  if (n == null) return '';
  return n >= 1000 ? Math.round(n / 1000) + 'K' : String(n);
}
function fmtUsd(n) {
  if (n == null || !Number.isFinite(n)) return '';
  if (n === 0) return '$0.00';
  if (n < 0.005) return '<$0.01';
  return '$' + n.toFixed(2);
}
function costText(cost) {
  if (!cost || cost.usd == null) return '价格未知';
  return fmtUsd(cost.usd) + (cost.complete ? '' : '+');
}
function costTitle(s) {
  if (!s.cost || s.cost.usd == null) {
    const names = s.cost && s.cost.unknownModels || s.models || [];
    return names.length ? '未收录官方 API 单价：' + names.join(', ') : '没有可计算的 token 用量';
  }
  const u = s.usage || {};
  const rows = [
    '按 Standard API 公开单价估算（USD）',
    '输入 ' + Number(u.inputTokens || 0).toLocaleString() +
      ' · 缓存读取 ' + Number(u.cachedInputTokens || 0).toLocaleString() +
      ' · 缓存写入 ' + Number((u.cacheWriteTokens || 0) + (u.cacheWrite1hTokens || 0)).toLocaleString() +
      ' · 输出 ' + Number(u.outputTokens || 0).toLocaleString(),
  ];
  if (!s.cost.complete && s.cost.unknownModels && s.cost.unknownModels.length) {
    rows.push('不含未定价模型：' + s.cost.unknownModels.join(', '));
  }
  return rows.join('\n');
}
function el(tag, cls, text) {
  const e = document.createElement(tag);
  if (cls) e.className = cls;
  if (text != null) e.textContent = text;
  return e;
}

const MARKDOWN_TAGS = new Set([
  'A', 'BLOCKQUOTE', 'BR', 'CODE', 'DEL', 'EM', 'H1', 'H2', 'H3', 'H4', 'H5', 'H6',
  'HR', 'IMG', 'INPUT', 'LI', 'OL', 'P', 'PRE', 'S', 'STRONG', 'TABLE', 'TBODY',
  'TD', 'TH', 'THEAD', 'TR', 'UL',
]);
const MARKDOWN_DROP_TAGS = new Set(['IFRAME', 'OBJECT', 'SCRIPT', 'STYLE', 'TEMPLATE']);

function safeUrl(value, image) {
  try {
    const url = new URL(value, location.href);
    if (url.protocol === 'http:' || url.protocol === 'https:') return value;
    if (!image && url.protocol === 'mailto:') return value;
  } catch {}
  return null;
}

function sanitizeMarkdown(root) {
  for (const node of [...root.querySelectorAll('*')]) {
    if (MARKDOWN_DROP_TAGS.has(node.tagName)) {
      node.remove();
      continue;
    }
    if (!MARKDOWN_TAGS.has(node.tagName)) {
      node.replaceWith(...node.childNodes);
      continue;
    }

    const href = node.tagName === 'A' ? safeUrl(node.getAttribute('href') || '', false) : null;
    const src = node.tagName === 'IMG' ? safeUrl(node.getAttribute('src') || '', true) : null;
    const title = node.getAttribute('title');
    const alt = node.getAttribute('alt');
    const languageClass = node.tagName === 'CODE' && /^language-[\w+-]+$/.test(node.className) ? node.className : null;
    const isCheckbox = node.tagName === 'INPUT' && node.getAttribute('type') === 'checkbox';
    const checked = isCheckbox && node.hasAttribute('checked');
    for (const attr of [...node.attributes]) node.removeAttribute(attr.name);

    if (node.tagName === 'INPUT' && !isCheckbox) {
      node.remove();
      continue;
    }

    if (node.tagName === 'A' && href) {
      node.setAttribute('href', href);
      node.setAttribute('target', '_blank');
      node.setAttribute('rel', 'noopener noreferrer');
    }
    if (node.tagName === 'IMG' && src) {
      node.setAttribute('src', src);
      node.setAttribute('loading', 'lazy');
      if (alt) node.setAttribute('alt', alt);
    }
    if (title && (node.tagName === 'A' || node.tagName === 'IMG')) node.setAttribute('title', title);
    if (languageClass) node.className = languageClass;
    if (isCheckbox) {
      node.setAttribute('type', 'checkbox');
      node.disabled = true;
      node.checked = checked;
    }
  }
  return root;
}

function renderMarkdown(text, cls = 'bubble markdown-body') {
  const bubble = el('div', cls);
  if (!window.marked) {
    bubble.textContent = text || '';
    return bubble;
  }
  try {
    const template = document.createElement('template');
    template.innerHTML = window.marked.parse(String(text || ''), { gfm: true, breaks: true });
    sanitizeMarkdown(template.content);
    bubble.appendChild(template.content);
  } catch {
    bubble.textContent = text || '';
  }
  return bubble;
}

function expandable(tag, cls, key) {
  const node = el(tag, cls);
  node.dataset.detailKey = key;
  node.open = state.expandedDetails.has(key);
  node.addEventListener('toggle', () => {
    node.open ? state.expandedDetails.add(key) : state.expandedDetails.delete(key);
  });
  return node;
}

function toolName(m) {
  if (m.toolName) return m.toolName;
  const match = String(m.text || '').match(/^\S+/);
  return match ? match[0] : '工具';
}

function renderActivity(messages, start, sessionFile) {
  const key = sessionFile + ':activity:' + start;
  const activity = expandable('details', 'activity', key);
  const calls = [];
  const byId = new Map();
  const rows = [];

  messages.forEach((m, timelineIndex) => {
    if (m.role === 'thinking') {
      rows.push({ type: 'thought', message: m, timelineIndex });
    } else if (m.role === 'tool_use') {
      const call = { use: m, results: [], timelineIndex };
      calls.push(call);
      rows.push({ type: 'tool', call, timelineIndex });
      if (m.callId) byId.set(m.callId, call);
    } else if (m.role === 'tool_result') {
      let call = m.callId && byId.get(m.callId);
      if (!call) call = calls.find(c => c.results.length === 0);
      if (!call) {
        call = { use: null, results: [], timelineIndex };
        rows.push({ type: 'tool', call, timelineIndex });
      }
      call.results.push(m);
    }
  });

  const label = calls.length ? '调用了 ' + calls.length + ' 次工具' : '思考';
  activity.appendChild(el('summary', null, label));
  const list = el('div', 'activity-list');

  rows.forEach(row => {
    if (row.type === 'thought') {
      const m = row.message;
      const thought = expandable('details', 'thought-item', key + ':thought:' + row.timelineIndex);
      thought.appendChild(el('summary', null, '思考' + (m.ts ? ' · ' + fmtTime(m.ts) : '')));
      const detail = el('div', 'tool-detail');
      detail.appendChild(renderMarkdown(m.text, 'tool-detail-value markdown-body'));
      thought.appendChild(detail);
      list.appendChild(thought);
      return;
    }

    const call = row.call;
    const item = expandable('details', 'tool-item', key + ':tool:' + row.timelineIndex);
    const name = call.use ? toolName(call.use) : (call.results[0] && toolName(call.results[0])) || '工具结果';
    item.appendChild(el('summary', null, name + (call.use && call.use.ts ? ' · ' + fmtTime(call.use.ts) : '')));
    const detail = el('div', 'tool-detail');
    if (call.use) {
      detail.appendChild(el('div', 'tool-detail-label', '工具调用'));
      detail.appendChild(el('div', 'tool-detail-value', call.use.input || call.use.text));
    }
    detail.appendChild(el('div', 'tool-detail-label', '工具结果'));
    detail.appendChild(el('div', 'tool-detail-value', call.results.length
      ? call.results.map(r => r.output || r.text).join('\n') : '（暂无结果）'));
    item.appendChild(detail);
    list.appendChild(item);
  });

  activity.appendChild(list);
  return activity;
}

// ---------- 统计页 ----------
// 分类色板(已用 dataviz 验证器在 #171a23 表面上校验,深色模式全部通过)
const SERIES_COLORS = ['#3987e5', '#d95926', '#199e70', '#c98500', '#d55181', '#008300', '#9085e9', '#e66767'];
const OTHER_COLOR = '#565f89';
// 蓝色顺序色阶(取自同一色板的文档化梯度,深色表面下由暗到亮)
const HEAT_COLORS = ['#20263a', '#184f95', '#256abf', '#3987e5', '#86b6ef'];
const SVG_NS = 'http://www.w3.org/2000/svg';

function svgEl(tag, attrs) {
  const n = document.createElementNS(SVG_NS, tag);
  for (const k in attrs || {}) n.setAttribute(k, attrs[k]);
  return n;
}

let tipNode = null;
function showTip(x, y, build) {
  if (!tipNode) { tipNode = el('div', 'viz-tooltip'); document.body.appendChild(tipNode); }
  tipNode.innerHTML = '';
  build(tipNode);
  tipNode.style.display = 'block';
  const r = tipNode.getBoundingClientRect();
  tipNode.style.left = Math.min(x + 14, window.innerWidth - r.width - 8) + 'px';
  tipNode.style.top = Math.max(8, Math.min(y + 14, window.innerHeight - r.height - 8)) + 'px';
}
function hideTip() { if (tipNode) tipNode.style.display = 'none'; }
function tipRow(tip, color, name, value) {
  const row = el('div', 'tt-row');
  if (color) {
    const key = el('span', 'tt-key');
    key.style.background = color;
    row.appendChild(key);
  }
  row.appendChild(el('span', 'tt-name', name));
  row.appendChild(el('span', 'tt-val', value));
  tip.appendChild(row);
}

function dateFromKey(k) { const [y, m, d] = k.split('-').map(Number); return new Date(y, m - 1, d); }
function dateKeyLocal(d) {
  return d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0') + '-' + String(d.getDate()).padStart(2, '0');
}
function statsCutoffKey() {
  if (!state.statsRange) return null;
  const d = new Date();
  d.setDate(d.getDate() - (state.statsRange - 1));
  return dateKeyLocal(d);
}
function shortDate(key) { const d = dateFromKey(key); return (d.getMonth() + 1) + '/' + d.getDate(); }
function niceStep(max, ticks) {
  const raw = max / ticks;
  const pow = Math.pow(10, Math.floor(Math.log10(raw || 1)));
  for (const m of [1, 2, 5, 10]) if (m * pow >= raw) return m * pow;
  return 10 * pow;
}

async function fetchStats() {
  const res = await fetch('/api/stats');
  state.statsData = await res.json();
  state.statsAt = Date.now();
}

// 模型 → 颜色:按全量总成本排序固定分配,时间筛选不改变既有配色
function modelColorMap(models) {
  const map = new Map();
  let slot = 0;
  for (const m of models) {
    if (m.usd > 0 && slot < SERIES_COLORS.length - 1) map.set(m.model, SERIES_COLORS[slot++]);
    else map.set(m.model, OTHER_COLOR);
  }
  return map;
}

function displayModel(colorMap, model) {
  return colorMap.get(model) === OTHER_COLOR ? '其他' : model;
}

function chartCard(page, title, sub) {
  const card = el('div', 'chart-card');
  card.appendChild(el('div', 'chart-title', title));
  if (sub) card.appendChild(el('div', 'chart-sub', sub));
  page.appendChild(card);
  return card;
}

function legendFor(card, entries) {
  const legend = el('div', 'chart-legend');
  for (const [name, color] of entries) {
    const key = el('span', 'key');
    const sw = el('span', 'swatch');
    sw.style.background = color;
    key.appendChild(sw);
    key.appendChild(document.createTextNode(name));
    legend.appendChild(key);
  }
  card.appendChild(legend);
}

// 每日成本堆叠柱状图
function drawDailyCost(card, daily, colorMap) {
  const byDay = new Map();
  for (const r of daily) {
    const name = displayModel(colorMap, r.model);
    if (!byDay.has(r.date)) byDay.set(r.date, new Map());
    const m = byDay.get(r.date);
    m.set(name, (m.get(name) || 0) + r.usd);
  }
  if (!byDay.size) { card.appendChild(el('div', 'chart-sub', '所选时间内没有成本数据')); return; }

  // 连续日期轴(包含零成本的日子),从范围起点(或最早数据)到今天
  const dates = [...byDay.keys()].sort();
  const days = [];
  for (let d = dateFromKey(dates[0]), end = new Date(); d <= end; d.setDate(d.getDate() + 1)) {
    days.push(dateKeyLocal(d));
  }
  // series 固定顺序:颜色表顺序(全量总成本降序),"其他"最后;只保留范围内出现的
  const present = new Set();
  for (const m of byDay.values()) for (const [name, v] of m) if (v > 0) present.add(name);
  const seriesNames = [];
  for (const model of colorMap.keys()) {
    const name = displayModel(colorMap, model);
    if (present.has(name) && !seriesNames.includes(name)) seriesNames.push(name);
  }

  const width = Math.max(320, card.clientWidth - 4);
  const m = { top: 12, right: 8, bottom: 22, left: 46 };
  const plotW = width - m.left - m.right, plotH = 220;
  const height = plotH + m.top + m.bottom;
  const svg = svgEl('svg', { class: 'chart-svg', viewBox: `0 0 ${width} ${height}`, height });

  const maxUsd = Math.max(...days.map(day =>
    [...(byDay.get(day) || new Map()).values()].reduce((a, b) => a + b, 0)));
  const step = niceStep(maxUsd, 4);
  const yMax = Math.max(step, Math.ceil(maxUsd / step) * step);
  const y = v => m.top + plotH - (v / yMax) * plotH;

  for (let v = 0; v <= yMax + 1e-9; v += step) {
    svg.appendChild(svgEl('line', { class: v === 0 ? 'axis' : 'grid', x1: m.left, x2: width - m.right, y1: y(v), y2: y(v) }));
    const label = svgEl('text', { class: 'tick-label', x: m.left - 6, y: y(v) + 4, 'text-anchor': 'end' });
    label.textContent = '$' + (step < 1 ? v.toFixed(1) : Math.round(v));
    svg.appendChild(label);
  }

  const band = plotW / days.length;
  const barW = Math.min(24, Math.max(2, band - 2));
  const labelEvery = Math.ceil(days.length / Math.max(3, Math.floor(plotW / 60)));
  days.forEach((day, i) => {
    const x = m.left + i * band + (band - barW) / 2;
    if (i % labelEvery === 0) {
      const t = svgEl('text', { class: 'tick-label', x: m.left + i * band + band / 2, y: height - 6, 'text-anchor': 'middle' });
      t.textContent = shortDate(day);
      svg.appendChild(t);
    }
    const segs = byDay.get(day);
    let acc = 0;
    if (segs) {
      for (const name of seriesNames) {
        const v = segs.get(name) || 0;
        if (v <= 0) continue;
        const y1 = y(acc), y0 = y(acc + v);
        // 段间留 1px 表面间隙
        const h = Math.max(0.5, y1 - y0 - (acc > 0 ? 1 : 0));
        svg.appendChild(svgEl('rect', {
          class: 'bar-seg', x, y: y1 - h, width: barW, height: h,
          fill: seriesColorByName(colorMap, name),
        }));
        acc += v;
      }
    }
    // 整列热区:悬停显示当天各模型明细
    const hit = svgEl('rect', { class: 'bar-hit', x: m.left + i * band, y: m.top, width: band, height: plotH });
    const show = (e) => {
      const total = acc;
      showTip(e.clientX, e.clientY, tip => {
        tip.appendChild(el('div', 'tt-title', day));
        if (!segs || !total) { tipRow(tip, null, '无成本', '$0'); return; }
        for (const name of seriesNames) {
          const v = segs.get(name) || 0;
          if (v > 0) tipRow(tip, seriesColorByName(colorMap, name), name, fmtUsd(v));
        }
        tipRow(tip, null, '合计', fmtUsd(total));
      });
    };
    hit.addEventListener('pointermove', show);
    hit.addEventListener('pointerleave', hideTip);
    svg.appendChild(hit);
  });

  card.appendChild(svg);
  const legendEntries = seriesNames.map(name => [name, seriesColorByName(colorMap, name)]);
  legendFor(card, legendEntries);
}

function seriesColorByName(colorMap, name) {
  if (name === '其他') return OTHER_COLOR;
  for (const [model, color] of colorMap) if (model === name) return color;
  return OTHER_COLOR;
}

// 模型成本占比饼图(≤6 片,长尾并入"其他")
function drawModelPie(card, daily, colorMap) {
  const totals = new Map();
  for (const r of daily) {
    const name = displayModel(colorMap, r.model);
    totals.set(name, (totals.get(name) || 0) + r.usd);
  }
  const all = [...totals.entries()].filter(([, v]) => v > 0).sort((a, b) => b[1] - a[1]);
  if (!all.length) { card.appendChild(el('div', 'chart-sub', '所选时间内没有成本数据')); return; }
  const top = all.slice(0, 5);
  const tail = all.slice(5).reduce((a, [, v]) => a + v, 0);
  const slices = tail > 0 ? [...top.filter(([n]) => n !== '其他'), ['其他', tail + (top.find(([n]) => n === '其他')?.[1] || 0)]] : top;
  const total = slices.reduce((a, [, v]) => a + v, 0);

  const size = 220, cx = size / 2, cy = size / 2, r1 = 100, r0 = 58;
  const wrap = el('div');
  wrap.style.display = 'flex';
  wrap.style.flexWrap = 'wrap';
  wrap.style.gap = '8px 24px';
  wrap.style.alignItems = 'center';
  const svg = svgEl('svg', { class: 'chart-svg', viewBox: `0 0 ${size} ${size}`, width: size, height: size });
  svg.style.flex = '0 0 auto';

  let angle = -Math.PI / 2;
  for (const [name, v] of slices) {
    const a0 = angle, a1 = angle + (v / total) * Math.PI * 2;
    angle = a1;
    const large = a1 - a0 > Math.PI ? 1 : 0;
    const p = (r, a) => `${cx + r * Math.cos(a)} ${cy + r * Math.sin(a)}`;
    const path = svgEl('path', {
      d: `M ${p(r1, a0)} A ${r1} ${r1} 0 ${large} 1 ${p(r1, a1)} L ${p(r0, a1)} A ${r0} ${r0} 0 ${large} 0 ${p(r0, a0)} Z`,
      fill: seriesColorByName(colorMap, name),
      stroke: '#171a23', 'stroke-width': 2, 'stroke-linejoin': 'round',
    });
    const show = e => showTip(e.clientX, e.clientY, tip => {
      tip.appendChild(el('div', 'tt-title', name));
      tipRow(tip, seriesColorByName(colorMap, name), (v / total * 100).toFixed(1) + '%', fmtUsd(v));
    });
    path.addEventListener('pointermove', show);
    path.addEventListener('pointerleave', hideTip);
    svg.appendChild(path);
  }
  const center = svgEl('text', { x: cx, y: cy - 2, 'text-anchor': 'middle' });
  center.textContent = fmtUsd(total);
  center.style.font = '600 20px -apple-system, sans-serif';
  center.setAttribute('fill', '#d8dce8');
  svg.appendChild(center);
  const centerSub = svgEl('text', { x: cx, y: cy + 18, 'text-anchor': 'middle' });
  centerSub.textContent = '总成本';
  svg.appendChild(centerSub);

  const list = el('div');
  list.style.flex = '1 1 220px';
  for (const [name, v] of slices) {
    const row = el('div', 'hbar-row');
    row.style.gridTemplateColumns = '12px 1fr auto auto';
    const sw = el('span', 'swatch');
    sw.style.cssText = 'width:10px;height:10px;border-radius:2px;background:' + seriesColorByName(colorMap, name);
    row.appendChild(sw);
    const nameNode = el('span', null, name);
    nameNode.style.cssText = 'white-space:nowrap;overflow:hidden;text-overflow:ellipsis';
    row.appendChild(nameNode);
    row.appendChild(el('span', 'hbar-val', (v / total * 100).toFixed(1) + '%'));
    row.appendChild(el('span', 'hbar-val', fmtUsd(v)));
    list.appendChild(row);
  }
  wrap.appendChild(svg);
  wrap.appendChild(list);
  card.appendChild(wrap);
}

// GitHub 风格活跃热力图(指标:每日消息轮次)
function drawHeatmap(card, activity, cutoffKey) {
  const byDay = new Map();
  for (const a of activity) {
    if (cutoffKey && a.date < cutoffKey) continue;
    byDay.set(a.date, a);
  }
  const today = new Date();
  // 起点:范围起点或最早数据,向前对齐到周一;最多展示 53 周
  let start = cutoffKey ? dateFromKey(cutoffKey)
    : (byDay.size ? dateFromKey([...byDay.keys()].sort()[0]) : new Date(today));
  const maxStart = new Date(today);
  maxStart.setDate(maxStart.getDate() - 52 * 7);
  if (start < maxStart) start = maxStart;
  start.setDate(start.getDate() - (start.getDay() + 6) % 7); // 对齐周一

  const values = [...byDay.values()].map(a => a.turns).filter(v => v > 0).sort((a, b) => a - b);
  const q = p => values.length ? values[Math.min(values.length - 1, Math.floor(values.length * p))] : 1;
  const thresholds = [q(0.25), q(0.5), q(0.75)];
  const level = v => v <= 0 ? 0 : v <= thresholds[0] ? 1 : v <= thresholds[1] ? 2 : v <= thresholds[2] ? 3 : 4;

  const cell = 12, gap = 3, left = 24, top = 16;
  const weeks = Math.ceil(((today - start) / 86400000 + 1) / 7);
  const width = left + weeks * (cell + gap);
  const height = top + 7 * (cell + gap) + 4;
  const scroll = el('div', 'heatmap-scroll');
  const svg = svgEl('svg', { class: 'chart-svg', viewBox: `0 0 ${width} ${height}`, width, height });
  svg.style.maxWidth = 'none';

  ['一', '三', '五'].forEach((txt, i) => {
    const t = svgEl('text', { x: left - 6, y: top + (i * 2) * (cell + gap) + cell - 2, 'text-anchor': 'end' });
    t.textContent = txt;
    svg.appendChild(t);
  });

  let lastMonth = -1;
  for (let w = 0; w < weeks; w++) {
    for (let dow = 0; dow < 7; dow++) {
      const d = new Date(start);
      d.setDate(d.getDate() + w * 7 + dow);
      if (d > today) break;
      const key = dateKeyLocal(d);
      if (dow === 0 && d.getMonth() !== lastMonth) {
        lastMonth = d.getMonth();
        const t = svgEl('text', { x: left + w * (cell + gap), y: 10 });
        t.textContent = (lastMonth + 1) + '月';
        svg.appendChild(t);
      }
      const a = byDay.get(key);
      const rect = svgEl('rect', {
        class: 'heatmap-cell', x: left + w * (cell + gap), y: top + dow * (cell + gap),
        width: cell, height: cell, rx: 2, fill: HEAT_COLORS[level(a ? a.turns : 0)],
      });
      const show = e => showTip(e.clientX, e.clientY, tip => {
        tip.appendChild(el('div', 'tt-title', key));
        tipRow(tip, null, '消息轮次', String(a ? a.turns : 0));
        if (a && a.sessions) tipRow(tip, null, '活跃会话', String(a.sessions));
      });
      rect.addEventListener('pointermove', show);
      rect.addEventListener('pointerleave', hideTip);
      svg.appendChild(rect);
    }
  }
  scroll.appendChild(svg);
  card.appendChild(scroll);

  const scale = el('div', 'heatmap-scale');
  scale.appendChild(el('span', null, '少'));
  for (const c of HEAT_COLORS) {
    const s = el('span', 'cell');
    s.style.background = c;
    scale.appendChild(s);
  }
  scale.appendChild(el('span', null, '多'));
  card.appendChild(scale);
  scroll.scrollLeft = scroll.scrollWidth;
}

// Top10 项目成本(水平条形图)
function drawTopProjects(card, projectDaily) {
  const totals = new Map();
  for (const r of projectDaily) {
    const cur = totals.get(r.project) || { name: r.name, usd: 0 };
    cur.usd += r.usd;
    totals.set(r.project, cur);
  }
  const rows = [...totals.values()].filter(p => p.usd > 0).sort((a, b) => b.usd - a.usd);
  if (!rows.length) { card.appendChild(el('div', 'chart-sub', '所选时间内没有成本数据')); return; }
  const top = rows.slice(0, 10);
  const max = top[0].usd;
  for (const p of top) {
    const row = el('div', 'hbar-row');
    const name = el('span', 'hbar-name', p.name);
    name.title = p.name;
    row.appendChild(name);
    const track = el('div', 'hbar-track');
    const fill = el('div', 'hbar-fill');
    fill.style.width = Math.max(1, p.usd / max * 100) + '%';
    track.appendChild(fill);
    row.appendChild(track);
    row.appendChild(el('span', 'hbar-val', fmtUsd(p.usd)));
    card.appendChild(row);
  }
  if (rows.length > 10) {
    const restUsd = rows.slice(10).reduce((a, p) => a + p.usd, 0);
    card.appendChild(el('div', 'chart-sub', '其余 ' + (rows.length - 10) + ' 个项目合计 ' + fmtUsd(restUsd)));
  }
}

function renderStats() {
  const main = document.getElementById('main');
  const d = state.statsData;
  main.innerHTML = '';
  if (!d) { main.appendChild(el('div', 'empty', '加载中…')); return; }
  const page = el('div', 'stats-page');
  main.appendChild(page);

  // 顶栏:返回(移动端) + 时间范围
  const filter = el('div', 'stats-filter');
  const back = el('button', 'back-btn', '‹ 返回');
  back.onclick = closeStats;
  filter.appendChild(back);
  for (const [label, days] of [['近 7 天', 7], ['近 30 天', 30], ['近 90 天', 90], ['全部', 0]]) {
    const btn = el('button', 'range-btn' + (state.statsRange === days ? ' active' : ''), label);
    btn.onclick = () => { state.statsRange = days; renderStats(); };
    filter.appendChild(btn);
  }
  page.appendChild(filter);

  const cutoffKey = statsCutoffKey();
  const daily = d.daily.filter(r => !cutoffKey || r.date >= cutoffKey);
  const projectDaily = d.projectDaily.filter(r => !cutoffKey || r.date >= cutoffKey);
  const activity = d.activity.filter(r => !cutoffKey || r.date >= cutoffKey);
  const colorMap = modelColorMap(d.models); // 基于全量排序,筛选不换色

  // KPI
  const totalUsd = daily.reduce((a, r) => a + r.usd, 0);
  const activeDays = new Set(daily.filter(r => r.usd > 0).map(r => r.date)).size;
  const totalTurns = activity.reduce((a, r) => a + r.turns, 0);
  const kpis = [
    ['总成本', fmtUsd(totalUsd)],
    ['日均成本(活跃日)', activeDays ? fmtUsd(totalUsd / activeDays) : '$0.00'],
    ['活跃天数', String(activity.length)],
    ['消息轮次', totalTurns.toLocaleString()],
  ];
  const kpiRow = el('div', 'kpi-row');
  for (const [label, value] of kpis) {
    const kpi = el('div', 'kpi');
    kpi.appendChild(el('div', 'kpi-label', label));
    kpi.appendChild(el('div', 'kpi-value', value));
    kpiRow.appendChild(kpi);
  }
  page.appendChild(kpiRow);

  const unknownNote = d.unknownModels && d.unknownModels.length
    ? '未收录单价(不计成本): ' + d.unknownModels.join(', ') : '';

  const c1 = chartCard(page, '每日成本', '按 Standard API 单价估算,柱内按模型细分' + (unknownNote ? ' · ' + unknownNote : ''));
  drawDailyCost(c1, daily, colorMap);

  const c2 = chartCard(page, '模型成本占比', '所选时间范围内各模型累计成本');
  drawModelPie(c2, daily, colorMap);

  const c3 = chartCard(page, '活跃热力图', '每日用户与助手消息轮次(所有来源)');
  drawHeatmap(c3, d.activity, cutoffKey);

  const c4 = chartCard(page, '项目成本 Top 10', '按会话所属项目累计');
  drawTopProjects(c4, projectDaily);
}

async function openStats() {
  state.statsOpen = true;
  state.activeFile = null;
  state.activeSession = null;
  state.detailStack = [];
  document.getElementById('statsToggle').classList.add('active');
  document.body.classList.add('detail-open');
  if (state.data) renderSidebar(); // 直接经 #stats 进入时会话列表可能尚未加载
  const main = document.getElementById('main');
  if (!state.statsData) main.innerHTML = '<div class="empty">加载中…</div>';
  try {
    await fetchStats();
  } catch (e) {
    main.innerHTML = '<div class="empty">统计加载失败: ' + e.message + '</div>';
    return;
  }
  if (state.statsOpen) renderStats();
}

function closeStats() {
  state.statsOpen = false;
  document.getElementById('statsToggle').classList.remove('active');
  document.body.classList.remove('detail-open');
  document.getElementById('main').innerHTML = '<div class="empty">选择左侧会话查看日志</div>';
}

async function refresh() {
  try {
    const res = await fetch('/api/sessions');
    state.data = await res.json();
    // 新出现的项目默认折叠；用户手动展开后，自动刷新不会改变其选择。
    for (const p of state.data.projects || []) {
      if (!state.knownProjects.has(p.project)) {
        state.knownProjects.add(p.project);
        state.collapsed.add(p.project);
      }
    }
    renderSidebar();
  } catch (e) {
    document.getElementById('stats').textContent = '刷新失败: ' + e.message;
  }
}

function projShort(project) {
  return project.split('/').filter(Boolean).pop() || project;
}

function sessionRow(s, showProject) {
  const row = el('div', 'session' + (s.file === state.activeFile ? ' active' : ''));
  row.appendChild(el('span', 'dot ' + s.status));
  const body = el('div', 'session-body');
  const title = el('div', 'session-title', (s.sessionKind === 'subagent' ? '↳ ' : '') + s.title);
  if (s.parentSessionKey || s.parentSessionId) title.title = '父会话：' + (s.parentSessionKey || s.parentSessionId);
  body.appendChild(title);
  const sub = el('div', 'session-sub');
  const parts = [];
  if (showProject) {
    const p = el('span', 'session-proj', projShort(s.project));
    sub.appendChild(p);
    sub.appendChild(document.createTextNode(' · '));
  }
  sub.appendChild(document.createTextNode(fmtTime(s.lastTs) + ' · ' + s.turns + ' 轮'));
  if (s.sessionKind === 'subagent') {
    sub.appendChild(document.createTextNode(' · '));
    sub.appendChild(el('span', 'subagent-tag', 'subagent' + (s.subagentType ? '/' + s.subagentType : '')));
  }
  if (s.model) {
    sub.appendChild(document.createTextNode(' · '));
    const model = el('span', 'model', s.model + (s.models && s.models.length > 1 ? ' +' + (s.models.length - 1) : ''));
    model.title = s.models && s.models.length ? s.models.join(', ') : s.model;
    sub.appendChild(model);
  }
  if (s.contextTokens != null) {
    sub.appendChild(document.createTextNode(' · '));
    sub.appendChild(el('span', 'ctx', fmtK(s.contextTokens) + ' ctx'));
  }
  if (s.usage && s.cost && s.cost.usd != null) {
    sub.appendChild(document.createTextNode(' · '));
    const cost = el('span', 'cost', costText(s.cost));
    cost.title = costTitle(s);
    sub.appendChild(cost);
  }
  if (s.gitBranch) sub.appendChild(document.createTextNode(' · ' + s.gitBranch));
  body.appendChild(sub);
  row.appendChild(body);
  const logoWrap = el('span');
  logoWrap.innerHTML = LOGOS[s.source] || '';
  logoWrap.title = SRC_NAMES[s.source] || s.source;
  row.appendChild(logoWrap.firstChild || logoWrap);
  row.onclick = () => openRootSession(s);
  return row;
}

function renderSidebar() {
  const { projects } = state.data;
  const sb = document.getElementById('sidebar');
  sb.innerHTML = '';
  let total = 0, running = 0, totalCost = 0, pricedSessions = 0, incompleteCosts = 0;
  const active = [];
  for (const p of projects) {
    total += p.sessions.length;
    for (const s of p.sessions) {
      if (s.status === 'running') { running++; active.push(s); }
      if (s.cost && s.cost.usd != null) {
        totalCost += s.cost.usd;
        pricedSessions++;
        if (!s.cost.complete) incompleteCosts++;
      } else if (s.usage) incompleteCosts++;
    }
  }
  // 顶部: 运行中会话,按最近活动降序
  if (active.length) {
    active.sort((a, b) => (b.lastTs || '').localeCompare(a.lastTs || ''));
    const box = el('div', 'project hot' + (state.collapsed.has('##active') ? ' collapsed' : ''));
    const head = el('div', 'project-head');
    head.appendChild(el('span', 'chevron', '▼'));
    const name = el('span', 'project-name', '运行中');
    name.style.color = 'var(--green)';
    head.appendChild(name);
    head.appendChild(el('span', 'project-meta', running + ' 运行'));
    head.onclick = () => { toggleGroup('##active'); box.classList.toggle('collapsed'); };
    box.appendChild(head);
    const list = el('div', 'session-list');
    for (const s of active) list.appendChild(sessionRow(s, true));
    box.appendChild(list);
    sb.appendChild(box);
  }
  // 项目分组
  for (const p of projects) {
    const box = el('div', 'project' + (state.collapsed.has(p.project) ? ' collapsed' : ''));
    const head = el('div', 'project-head');
    head.appendChild(el('span', 'chevron', '▼'));
    head.appendChild(el('span', 'project-name', p.name));
    let metaText = (p.running ? '● ' + p.running + ' · ' : '') + p.sessions.length + ' 会话';
    if (p.totalCost && p.totalCost.usd != null) metaText += ' · ' + fmtUsd(p.totalCost.usd);
    metaText += ' · ' + fmtAge(p.lastTs);
    const meta = el('span', 'project-meta', metaText);
    if (p.running) meta.style.color = 'var(--green)';
    head.appendChild(meta);
    head.onclick = () => { toggleGroup(p.project); box.classList.toggle('collapsed'); };
    box.appendChild(head);
    const list = el('div', 'session-list');
    for (const s of p.sessions) list.appendChild(sessionRow(s, false));
    box.appendChild(list);
    sb.appendChild(box);
  }
  if (!projects.length) sb.appendChild(el('div', 'empty', '没有找到任何会话日志'));
  document.getElementById('stats').textContent =
    projects.length + ' 项目 · ' + total + ' 会话' + (running ? ' · ' + running + ' 运行中' : '') +
    (pricedSessions ? ' · ' + fmtUsd(totalCost) + (incompleteCosts ? '+' : '') : '') +
    (state.data.remoteHosts && state.data.remoteHosts.length ? ' · SSH ' + state.data.remoteHosts.join(', ') : '') +
    (state.data.remoteErrors && state.data.remoteErrors.length ? ' · SSH 异常' : '');
}

function toggleGroup(key) {
  state.collapsed.has(key) ? state.collapsed.delete(key) : state.collapsed.add(key);
}

function closeDetail() {
  document.body.classList.remove('detail-open');
  state.activeFile = null;
  state.activeSession = null;
  state.detailStack = [];
  renderSidebar();
}

function openRootSession(s) {
  if (state.statsOpen) closeStats();
  state.detailStack = [];
  openSession(s);
}

function openSubagent(s) {
  if (!s || !s.file) return;
  if (state.activeSession) state.detailStack.push(state.activeSession);
  openSession(s);
}

function navigateBack() {
  const parent = state.detailStack.pop();
  if (parent) openSession(parent);
  else closeDetail();
}

async function openSession(s, keepScroll) {
  state.activeFile = s.file;
  state.activeSession = s;
  renderSidebar();
  document.body.classList.add('detail-open');
  const main = document.getElementById('main');
  const wasAtBottom = keepScroll && main.scrollHeight - main.scrollTop - main.clientHeight < 80;
  if (!keepScroll) main.innerHTML = '<div class="empty">加载中…</div>';
  try {
    const res = await fetch('/api/session?file=' + encodeURIComponent(s.file));
    const data = await res.json();
    if (state.activeFile !== s.file) return; // 用户已切换
    main.innerHTML = '';
    const head = el('div', 'detail-head');
    const back = el('button', 'back-btn' + (state.detailStack.length ? ' child-back' : ''), '‹ 返回');
    back.onclick = navigateBack;
    head.appendChild(back);
    const summary = el('div', 'detail-summary');
    summary.appendChild(el('div', null, (SRC_NAMES[s.source] || s.source) + ' · ' + s.title));
    const metrics = [];
    if (s.id) metrics.push('Session ID ' + s.id);
    if (s.model) metrics.push('模型 ' + s.model + (s.models && s.models.length > 1 ? ' +' + (s.models.length - 1) : ''));
    if (s.contextTokens != null) metrics.push(fmtK(s.contextTokens) + ' ctx');
    if (s.usage) metrics.push(costText(s.cost));
    const metricsNode = el('div', 'detail-metrics', metrics.join(' · '));
    metricsNode.title = costTitle(s);
    summary.appendChild(metricsNode);
    head.appendChild(summary);
    main.appendChild(head);
    const roleNames = { user: '用户', assistant: '助手' };
    for (let i = 0; i < data.messages.length;) {
      const m = data.messages[i];
      if (m.role === 'subagent') {
        const eventNames = {
          started: 'Agent 已创建', completed: 'Agent 完成', failed: 'Agent 失败',
          timeout: 'Agent 超时', cancelled: 'Agent 已取消', aborted: 'Agent 已中止',
        };
        const box = el('div', 'msg subagent-event');
        box.appendChild(el('div', 'meta', (eventNames[m.event] || 'Agent 状态') + (m.ts ? ' · ' + fmtTime(m.ts) : '')));
        const card = el(m.subagent ? 'button' : 'div', 'subagent-card');
        if (m.subagent) card.type = 'button';
        card.appendChild(el('div', 'subagent-card-title', m.title || m.agentId || 'Subagent'));
        const details = [];
        if (m.subagent && m.subagent.model) details.push(m.subagent.model);
        if (m.subagent) details.push('点击查看 subagent 记录');
        card.appendChild(el('div', 'subagent-card-sub', details.join(' · ') || m.text || ''));
        if (m.subagent) card.onclick = () => openSubagent(m.subagent);
        box.appendChild(card);
        main.appendChild(box);
        i++;
        continue;
      }
      if (m.role === 'thinking' || m.role === 'tool_use' || m.role === 'tool_result') {
        let end = i + 1;
        while (end < data.messages.length && ['thinking', 'tool_use', 'tool_result'].includes(data.messages[end].role)) end++;
        main.appendChild(renderActivity(data.messages.slice(i, end), i, s.file));
        i = end;
        continue;
      }
      if (m.role === 'compaction') {
        const details = [];
        if (m.trigger) details.push(m.trigger === 'auto' ? '自动' : m.trigger === 'manual' ? '手动' : m.trigger);
        if (m.beforeTokens != null && m.afterTokens != null) {
          details.push(fmtK(m.beforeTokens) + ' → ' + fmtK(m.afterTokens) + ' tokens');
        } else if (m.beforeTokens != null) {
          details.push('压缩前 ' + fmtK(m.beforeTokens) + ' tokens');
        }
        if (m.durationMs != null) details.push((m.durationMs / 1000).toFixed(1) + 's');
        if (m.ts) details.push(fmtTime(m.ts));
        const box = el('div', 'msg compaction');
        box.appendChild(el('span', 'compaction-label', '上下文已压缩' + (details.length ? ' · ' + details.join(' · ') : '')));
        main.appendChild(box);
        i++;
        continue;
      }
      const box = el('div', 'msg ' + m.role);
      if (m.role === 'divider') { box.textContent = m.text; main.appendChild(box); i++; continue; }
      box.appendChild(el('div', 'meta', (roleNames[m.role] || m.role) + (m.ts ? ' · ' + fmtTime(m.ts) : '')));
      box.appendChild(renderMarkdown(m.text));
      main.appendChild(box);
      i++;
    }
    if (data.messages.length === 0) main.appendChild(el('div', 'empty', '没有可显示的消息'));
    if (!keepScroll || wasAtBottom) main.scrollTop = main.scrollHeight;
  } catch (e) {
    main.innerHTML = '<div class="empty">加载失败: ' + e.message + '</div>';
  }
}

function findActive() {
  if (!state.data || !state.activeFile) return null;
  for (const p of state.data.projects)
    for (const s of p.sessions) if (s.file === state.activeFile) {
      state.activeSession = s;
      return s;
    }
  return state.activeSession;
}

document.getElementById('statsToggle').onclick = () => state.statsOpen ? closeStats() : openStats();
if (location.hash === '#stats') openStats();

refresh();
setInterval(async () => {
  await refresh();
  if (state.statsOpen) {
    // 统计数据 60s 静默刷新一次,保持当前渲染不闪烁
    if (Date.now() - state.statsAt > 60000) {
      try { await fetchStats(); if (state.statsOpen) renderStats(); } catch {}
    }
    return;
  }
  const s = findActive();
  if (s && s.status !== 'idle') openSession(s, true); // 运行中的会话跟随刷新
}, 5000);
</script>
